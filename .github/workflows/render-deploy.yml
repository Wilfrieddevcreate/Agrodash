name: CI · Deploy to Render

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: render-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ──────────────────────────────────────────────────────────
  # 1. Validate: install, typecheck, build
  # ──────────────────────────────────────────────────────────
  validate:
    name: Typecheck & Build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      NEXT_TELEMETRY_DISABLED: "1"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20.18.0
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: TypeScript check
        run: npx tsc --noEmit

      - name: Lint
        run: npx eslint .
        continue-on-error: true

      - name: Build
        run: npm run build

  # ──────────────────────────────────────────────────────────
  # 2. Deploy: fire Render's deploy hook (main only)
  #    Gracefully skips when RENDER_DEPLOY_HOOK_URL is not set,
  #    so the workflow stays green until Render is wired up.
  # ──────────────────────────────────────────────────────────
  deploy:
    name: Deploy to Render
    if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
    needs: validate
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Check for deploy hook
        id: hook
        env:
          RENDER_DEPLOY_HOOK_URL: ${{ secrets.RENDER_DEPLOY_HOOK_URL }}
        run: |
          if [ -z "$RENDER_DEPLOY_HOOK_URL" ]; then
            echo "configured=false" >> "$GITHUB_OUTPUT"
            echo "::warning::RENDER_DEPLOY_HOOK_URL secret is not set — skipping deploy. Add it at Settings → Secrets and variables → Actions."
          else
            echo "configured=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Trigger Render deploy hook
        if: steps.hook.outputs.configured == 'true'
        env:
          RENDER_DEPLOY_HOOK_URL: ${{ secrets.RENDER_DEPLOY_HOOK_URL }}
        run: |
          echo "Triggering Render deploy..."
          response=$(curl -sS -w "\n%{http_code}" -X POST "$RENDER_DEPLOY_HOOK_URL")
          body=$(echo "$response" | head -n -1)
          code=$(echo "$response" | tail -n 1)
          echo "HTTP $code"
          echo "$body"
          if [ "$code" -ge 400 ]; then
            echo "::error::Render deploy hook failed with status $code"
            exit 1
          fi

      - name: Summary — skipped
        if: steps.hook.outputs.configured == 'false'
        run: |
          {
            echo "### ⏭️ Deploy skipped"
            echo ""
            echo "No \`RENDER_DEPLOY_HOOK_URL\` secret is configured."
            echo ""
            echo "**To enable auto-deploy:**"
            echo "1. Create the Render service (via \`render.yaml\` Blueprint)."
            echo "2. In the service: **Settings → Deploy Hook → Copy URL**."
            echo "3. In this repo: **Settings → Secrets and variables → Actions → New repository secret**."
            echo "   Name: \`RENDER_DEPLOY_HOOK_URL\`. Paste the URL as the value."
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Summary — triggered
        if: steps.hook.outputs.configured == 'true'
        run: |
          {
            echo "### 🚀 Deploy triggered"
            echo ""
            echo "Render is now building commit \`${{ github.sha }}\`."
            echo "Watch the logs in the [Render dashboard](https://dashboard.render.com)."
          } >> "$GITHUB_STEP_SUMMARY"
